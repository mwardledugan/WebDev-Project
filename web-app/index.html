        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function startGame() {
            questions = shuffleArray(allQuestions).slice(0, 15);
            currentQuestionIndex = 0;
            quirkyScore = 0;
            answered = false;
            document.getElementById('gameContainer').style.display = 'block';
            document.getElementById('resultsScreen').classList.remove('show');
            document.getElementById('judgment').innerHTML = '';
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                showResults();
                return;

            answered = false;
            const question = questions[currentQuestionIndex];

            document.getElementById('questionNum').textContent = currentQuestionIndex + 1;
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('option1').textContent = '✨ ' + question.option1;
            document.getElementById('option2').textContent = '✨ ' + question.option2;
            document.getElementById('option1').disabled = false;
            document.getElementById('option2').disabled = false;
            document.getElementById('judgment').innerHTML = '';
            document.getElementById('judgment').classList.remove('show');

            // Update progress bar
            const progress = ((currentQuestionIndex) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

            const question = questions[currentQuestionIndex];
            let earnedPoints = optionNum === 1 ? question.quirky1 : question.quirky2;
            let judgment = optionNum === 1 ? question.judgment1 : question.judgment2;

            quirkyScore += earnedPoints;
            document.getElementById('quirkyScore').textContent = quirkyScore;

            document.getElementById('judgment').innerHTML = judgment + ' <strong>+' + earnedPoints + ' Quirky Points!</strong>';
            document.getElementById('judgment').classList.add('show');

            document.getElementById('option1').disabled = true;
            document.getElementById('option2').disabled = true;

            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 1500);
        }

        function showResults() {
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('resultsScreen').classList.add('show');
            document.getElementById('finalScore').textContent = quirkyScore;

            let personality = getPersonality(quirkyScore);
            document.getElementById('personalityTitle').textContent = personality.title;
            document.getElementById('personalityDesc').textContent = personality.description;
        }

        function getPersonality(score) {
            if (score >= 45) {
                return {
                    title: '🌈 Ultimate Chaos Agent',
                    description: 'You\'re HILARIOUSLY quirky! You were born to break the mold and make the world more entertaining. Pure chaos energy with a heart of gold. We need more of you!'
                };
            } else if (score >= 40) {
                return {
                    title: '🎪 Certified Weirdo',
                    description: 'You\'re wonderfully unhinged! Your quirk level is off the charts, and you wear it like a badge of honor. Life is your personal comedy show!'
                };
            } else if (score >= 35) {
                return {
                    title: '🎨 Creative Chaos',
                    description: 'You\'re a beautiful mess of creativity and weirdness! Your imagination knows no bounds, and you\'re not afraid to live life on your own terms. Brilliant!'
                };
            } else if (score >= 30) {
                return {
                    title: '🚀 Adventurous Spirit',
                    description: 'You\'re quirky with purpose! You make bold, daring choices and live for the thrill. You\'re the friend everyone wants at a party because you\'re always up for anything!'
                };
            } else if (score >= 25) {
                return {
                    title: '✨ Spirited Rebel',
                    description: 'You\'ve got that perfect mix of fun and practicality. You take risks when it matters, but you also know how to have a good time. Perfectly balanced chaos!'
                };
            } else if (score >= 20) {
                return {
                    title: '⭐ Balanced Adventurer',
                    description: 'You\'re a little bit quirky, a little bit practical, with a healthy dash of adventure. You know how to have fun without losing your grip on reality!'
                };
            } else if (score >= 15) {
                return {
                    title: '🌟 Grounded Explorer',
                    description: 'You\'re mostly sensible with subtle quirky tendencies. You\'re reliable, but you\'re not afraid to color outside the lines once in a while. Solid choices overall!'
                };
            } else if (score >= 10) {
                return {
                    title: '🎯 Pragmatic Soul',
                    description: 'You\'re quite rational and thoughtful in your decisions. You prefer the predictable path, but you\'re open to a little weirdness now and then. That\'s respectable!'
                };
            } else if (score >= 5) {
                return {
                    title: '📚 Wise Conservative',
                    description: 'You\'re very logical and responsible! You think things through carefully before making choices. Boring? Maybe. But the world needs grounded people like you!'
                };
            } else {
                return {
                    title: '🎯 Perfectly Sensible',
                    description: 'You\'re the most rational person here. Extremely practical, logical, and probably make excellent life decisions. But seriously... have you considered being weird just once?'
                };
            }
        }

        function goHome() {
            window.history.back();
        }

        window.onload = startGame;
    </script>
</body>
</html>
